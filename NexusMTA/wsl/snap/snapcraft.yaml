name: nexus-mta-wsl
version: '1.0.0'
summary: Nexus Mail Transfer Agent (WSL)
description: |
  Mail Transfer Agent (MTA) for Nexus mail system.
  Native C implementation for Windows WSL.
base: core22
confinement: strict
grade: stable
architectures:
  - build-on: amd64
    run-on: amd64

apps:
  nexus-mta:
    command: bin/nexus-mta
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  nexus-mta:
    plugin: make
    source: .
    source-type: local
