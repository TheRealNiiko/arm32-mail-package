name: nexus-rmc-aarch64
version: '1.0.0'
summary: Nexus Remote Mail Client (ARM64)
description: |
  Remote mail management with DKIM, DMARC, SPF support.
  ARM64 Linux version.
base: core22
confinement: strict
grade: stable
architectures:
  - build-on: arm64
    run-on: arm64

apps:
  nexus-rmc:
    command: bin/nexus-rmc

parts:
  nexus-rmc:
    plugin: make
    source: .
    source-type: local
