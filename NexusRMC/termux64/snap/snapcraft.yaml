name: nexus-rmc-termux64
version: '1.0.0'
summary: Nexus Remote Mail Client (Termux 64-bit)
description: |
  Remote mail management with DKIM, DMARC, SPF support.
  64-bit ARM Termux version.
base: core22
confinement: strict
grade: stable
architectures:
  - build-on: arm64
    run-on: arm64

apps:
  nexus-rmc:
    command: bin/nexus-rmc

parts:
  nexus-rmc:
    plugin: make
    source: .
    source-type: local
