name: nexus-rmc-termux32
version: '1.0.0'
summary: Nexus Remote Mail Client (Termux 32-bit)
description: |
  Remote mail management with DKIM, DMARC, SPF support.
  32-bit ARM Termux version.
base: core22
confinement: strict
grade: stable
architectures:
  - build-on: armhf
    run-on: armhf

apps:
  nexus-rmc:
    command: bin/nexus-rmc

parts:
  nexus-rmc:
    plugin: make
    source: .
    source-type: local
