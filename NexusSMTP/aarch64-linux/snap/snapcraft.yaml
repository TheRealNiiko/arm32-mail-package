name: nexus-smtp-aarch64
version: '1.0.0'
summary: Nexus SMTP Server (ARM64)
description: |
  SMTP server for Nexus mail system.
  ARM64 Linux version.
base: core22
confinement: strict
grade: stable
architectures:
  - build-on: arm64
    run-on: arm64

apps:
  nexus-smtp:
    command: bin/nexus-smtp
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  nexus-smtp:
    plugin: make
    source: .
    source-type: local
