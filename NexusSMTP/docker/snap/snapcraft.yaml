name: nexus-smtp-docker
version: '1.0.0'
summary: Nexus SMTP Server (Docker)
description: |
  SMTP server for Nexus mail system.
  Docker container version.
base: core22
confinement: strict
grade: stable
architectures:
  - build-on: amd64
    run-on: amd64

apps:
  nexus-smtp:
    command: bin/nexus-smtp
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  nexus-smtp:
    plugin: make
    source: .
    source-type: local
